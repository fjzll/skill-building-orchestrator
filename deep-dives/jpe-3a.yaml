slice: "3a"
title: Mandate to Term Sheet and Deal-Text Preparation
parent_slice: "3"
working_date: 2026-06-30
completeness: 12 of 13 confirmed · 0 working interpretation · 1 open
flow_summary: >
  Mandate signed; Jason/Nic tell Lauren the terms. Lauren opens the JP template,
  pulls reusable mandate text into matching sections. Nic drafts company overview
  and investment highlights (the two time-eaters). Offer details and director
  commitments lifted from mandate; use of funds set per deal. Night before —
  back office emailed for ten-day VWAP and last close off Iress (~$1k/month),
  Jason sets price and discounts, team works the capital-structure maths (shares
  on issue off public filings, shares to issue, market cap, EV, post-offer cash)
  — the late-night error point. Timetable ~7 days from back-to-trading. Lauren
  updates per-deal disclosure lines. Final check unclear. Text reformatted the
  way Complii expects. Two waves in practice — mandate-sourced sections early;
  highlights, pricing, maths land the night before.
