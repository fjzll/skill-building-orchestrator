    what: export route + shape consistency
    ask: GML from Front Office? All stock exports same fields/format?
    who: Jason/Lauren/Morrison
  - step: '5'
    what: dedupe edge cases
    ask: blank/changed Client Email meaning; does email rule wrongly merge different people sharing one email?
    who: Jason/Lauren
  - step: '6'
    what: order + cross-code handling
    ask: dedupe before or after combining; client under two codes?
    who: Lauren
  - step: '7'
    what: mismatched-email grouping
    ask: how spotted/grouped; miss frequency?
    who: Jason/Lauren
  - step: '8'
    what: C-account rule
    ask: C accounts ever on update lists?
    who: Jason
  - step: '9'
    what: approval owner
    ask: who signs off?
    who: Jason
  - step: slice
    what: messy-case walkthrough
    ask: use GML export + duplicate-handled file to walk the actual duplicate patterns; enough for first proof pack?
    who: Jason/Lauren
