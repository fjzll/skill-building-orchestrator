slice: "1"
title: Client Holder Update Emails
working_date: 2026-07-01
completeness: 9 of 10 confirmed · 0 working interpretation · 1 open
flow_summary: >
  Iris/ASX alert → adviser materiality call → Front Office holder export by
  adviser code → dedupe by email in Excel → JP house-shape draft (price, market
  cap, cash, summary, commentary, catalysts, often reusing Tyler's text) →
  attach announcement → BCC blocks of 20-30 under ~100/person/hour Microsoft
  limit → relationship adviser sends from own mailbox (Lauren/Michael corporate
  fallback). Tyler's quarterly summary is the same workflow run deeper.
steps:
  - {id: "0", title: Release monitoring, status: confirmed, who: Adviser via Iris live alerts (paid) / ASX website (not delayed), load: mechanical}
  - {id: "1", title: Update trigger appears, status: confirmed, who: Adviser, note: JP sends an update at least every second day, load: reading}
  - {id: "2", title: Adviser decides whether it matters, status: confirmed, who: Jason/Nic/relationship adviser, note: price-sensitive generally goes but not absolute; non-price-sensitive case by case, load: judgement}
  - id: '3'
    title: Holder list pulled from Front Office
    status: confirmed
    who: Adviser or Lauren
    note: search adviser code + stock, export CSV; every adviser has a code, Nic has two; daily sync
    nested: '2'
    load: mechanical
  - id: '4'
    title: Duplicates removed by email
    status: confirmed
    who: Adviser or Lauren
    note: by-hand email match, "pretty reliable" because a client's entities share one email
    nested: '2'
    load: mechanical
  - id: '5'
    title: Summary email drafted
    status: confirmed
    who: Adviser in own voice
    note: no brand/style guide yet, only loose asset pack; must keep personal twang, not read as AI
    load: reading
  - {id: "6", title: Announcement attached, status: confirmed, who: Adviser, note: easy to forget (Tyler/Gateway example), load: mechanical}
  - {id: "7", title: Staged into BCC groups, status: confirmed, who: Adviser or Lauren, note: 20-30 per block; limit is per person — Lauren blocked 22-Jun sending Finder report, load: mechanical}
  - {id: "8", title: Adviser reviews and sends, status: confirmed, who: Relationship adviser (corporate fallback), note: personal-mailbox send is relationship choice not compliance rule, load: judgement}
  - id: '9'
    title: Send blocking and delivery tracking
    status: open
    who: unknown
    question: after a blocked send how do you know who received it and how do you finish?
    load: mechanical
handoffs:
  - {from: Iris/ASX, to: Adviser, what: release alert, status: confirmed}
  - {from: Adviser materiality call, to: Adviser/Lauren, what: go-ahead + chosen codes, status: confirmed}
  - {from: Front Office, to: Adviser/Excel, what: holder CSV by code, status: confirmed}
  - {from: Adviser/Excel, to: Outlook, what: cleaned deduped list, status: confirmed}
  - {from: Tyler, to: Adviser, what: reusable update text, status: confirmed}
  - {from: Adviser/Lauren/Michael, to: Clients, what: update + attachment in BCC groups, status: confirmed}
  - {from: Outlook, to: Adviser, what: send result incl. any block, status: open}
open_items:
  - step: '3'
    what: programmatic export/API route
    ask: GML CSV from Front Office? Pull by code+stock via API or assume manual upload?
    who: Jason/Nic + Morrison/IT
  - step: '4'
    what: exact duplicate and related-entity rules
    ask: why blanked/changed Client Email values; how decide two entities are one client; one email covering different people?
    who: Jason/Nic
  - step: '5'
    what: gold-standard sign-off
    ask: GML/Strickland/Tyler as gold standard or replace?
    who: Jason/Nic
  - step: '5'
    what: brand or style guide
    ask: guide for tone/format/disclaimers/colours or only asset pack (Dee and Jonah formalising)?
    who: Jason/Nic
  - step: '7'
    what: send-limit workaround
    ask: extra send addresses (JS@jpequity) vs third-party platform (Mailchimp) — which keeps personal look?
    who: Jason/Nic
  - step: '8'
    what: approval and send-choice shape
    ask: how approve draft+list and pick which advisers' clients?
    who: Jason/Nic
  - step: '9'
    what: delivery tracking after blocked send
    ask: who received, how to finish?
    who: Jason/Nic
notes:
  - Tyler's quarterly summary = richer end of this slice, not separate flow.
  - Liquidity alert is competitor speed reference (beat JP to own house stock 22-Jun), informs target not process.
  - Steps 3-4 are the entry point to Slice 2.
sources: [22-Jun kickoff part 1 (Fathom), 22-Jun kickoff part 2 (manual), 28-May AI audit meeting, Tyler house-stocks update email 22-Jun, Liquidity GML alert 22-Jun, Nic prep examples 19-Jun, Jason GML proof pack 01-Jul]
