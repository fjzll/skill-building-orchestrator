fixtures: [fixtures/announcement.txt]
output: output.md
layer1:
  required_fields: ["market cap", "cash", "attached", "catalysts"]
  forbidden: ["as an AI", "I cannot"]
layer2:
  number_sources: [fixtures/announcement.txt]
layer3:
