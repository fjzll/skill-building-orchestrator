slice: "2"
title: Holder List Cleanup and Entity Matching
workflow: client-communications
shared_foundation: holder-recipient-identity
working_date: 2026-07-01
tagline: AI builds a clean recipient list end to end. Nothing is sent here.
what_changes: >
  AI takes the holder export and does the whole cleanup end to end — removes exact
  email duplicates, groups a client's related accounts (super fund, family trust,
  company, individual, spouse), flags uncertain merges in a short check sheet,
  scoped to the right adviser code. Jason's GML export (108 rows, 34 columns) and
  duplicate-handled CSV give the first real file. Nothing sent in this slice;
  almost every step fully automated. Output feeds the update-email step
  (draft-only). Recipient layer under client updates, raise sends and live-deal
  follow-up — build once, reuse.
steps:
  - id: "1"
    title: Set the scope (which stock, whose codes)
    today: Adviser or Lauren decides which stock and which adviser code(s). Some advisers have two codes; pilot covers Jason's code plus Nic's two.
    with_ai: AI takes stock from update trigger and a saved code map, sets search scope.
    states: [automate]
  - id: "2"
    title: Open Front Office
    today: Adviser or Lauren logs in to Front Office (Morrison).
    with_ai: Clean path is direct Morrison connection (API precedent — Power BI report). Simple start is manual export + upload, no system access needed. Access/permissions unconfirmed.
    states: [automate, access-to-confirm]
  - id: "3"
    title: Pull holders for stock and code
    today: Searches everyone under the code holding the stock (Jason's Finder example).
    with_ai: If connected, AI requests holders by code and stock; else works from exported file.
    states: [automate, access-to-confirm]
  - id: "4"
    title: Get the list into a working table
    today: Exports matching holders to CSV including emails. GML export is first real example (108 rows, 34 cols).
    with_ai: AI reads export on landing, lays it out ready to clean. Confirm whether all stock exports share this shape.
    states: [automate]
  - id: "5"
    title: Remove duplicates and group accounts
    today: Removes duplicate rows by email in Excel — "pretty reliable", not complete.
    with_ai: AI removes exact email duplicates, groups related accounts, lists uncertain merges in check sheet, one row per person. Goes beyond today's email-only rule. Optional glance at flagged ones.
    states: [automate]
  - id: "6"
    title: Combine several adviser codes into one list
    today: Lauren pulls each code separately and combines (Jason's + Nic's two).
    with_ai: AI merges codes in one pass, handles cross-code clients against a rule JP sets. Cross-code counting rule is open (Lauren).
    states: [automate]
  - id: "7"
    title: Catch clients the email rule misses
    today: Not done in a set way; email-only rule can miss clients whose accounts use different emails.
    with_ai: AI spots likely-related accounts by name, shared address, account links; flags so clients neither dropped nor double-counted. Gain over current process.
    states: [automate]
  - id: "8"
    title: Decide whether Complii C accounts belong
    today: Unclear whether routine update lists draw on Complii corporate C accounts.
    with_ai: Once rule set, AI includes/excludes to match. Programmatic Complii route unproven — no public connection point.
    states: [automate, access-to-confirm]
  - id: "9"
    title: Approve the recipient list
    today: Unclear; list builder appears to also send, no separate check.
    with_ai: AI presents clean list + flagged exclusions as short pack; optional glance. No approval gate here — send-time sign-off lives in email step.
    states: [automate]
  - id: "10"
    title: Hand the clean list to the send
    today: Cleaned list passed into staged send (batches 20-30).
    with_ai: AI outputs clean scoped list and per-adviser batches for the update-email step.
    states: [automate]
step_counts: {automate: 7, access_to_confirm: 3, human_review: 0, human: 0}
data_access:
  - source: Front Office holder data (Morrison)
    route: CSV export first (no access needed), later direct API pull by adviser code
    confidence: high file / medium direct
  - {source: The export itself, route: Jason's GML holder export + duplicate-handled output; confirm layout is standard, confidence: medium}
  - {source: Complii C accounts, route: only if rule confirms they belong; export or vendor-supported link, confidence: low}
fits: >
  Recipient-list builder under client updates, raise sends, live-deal follow-up.
  Build once as shared clean-list service. Bigger prize — remembered groupings
  become a single client record the rest of the work leans on.
effort: >
  Small to Medium. Lighter than client updates (no watching, drafting, send
  mechanics). Trickier matches need a real export and a short session. Pays back
  quickly — three workflows reuse it.
