# Canonical workflow map — JP Equity Partners (JPE)
# Source: portal Capability Workflows + Opportunity Decision Lens tabs, updated 01-Jul-2026
# Ingested by v0 adapter (rendered-page scrape), 04-Jul-2026
client:
  code: JPE
  name: JP Equity Partners

workflows:
  - id: client-communications
    name: Client updates and social branch
    category: CLIENT COMMUNICATIONS
    slices: ["1", "2", "7"]
    starts: ASX announcement, quarterly or research report appears.
    stops: Reviewed email pack, cleaned recipients and optional social draft ready for a person to send or publish.
    decision_lens_rank: 1
    why_now: Updates at least every second day; Outlook blocks ~100 emails/person/hour; JP named this easiest starting workflow; GML, Strickland, Tyler and Liquidity show the pattern.
    main_risk: Sender path and Front Office access.
    proof_needed: Morrison API/manual-export answer; gold-standard examples confirmation; exact duplicate rule; send-limit workaround; adviser approval step.

  - id: capital-raise
    name: Capital raise operating layer
    category: CAPITAL RAISES
    slices: ["3", "3a", "8"]
    shared_slice_deps: ["2"]
    starts: Mandate or advanced deal brief exists.
    stops: Deal text prepared, follow-up tracked, book closes. Pricing, allocation, scale-back stay with JP.
    decision_lens_rank: 2
    why_now: Fee-earning raise work is time-pressured and error-prone; first build is term-sheet and deal-text prep, not a Complii plugin.
    main_risk: Templates and official market-data source not settled.
    proof_needed: Gold-standard term sheet; VWAP/source decision; Complii paste format; final maths check.

  - id: desk-notes
    name: Desk-note production
    category: RESEARCH AND MARKETING
    slices: ["4"]
    starts: Paying desk-note opportunity and source pack.
    stops: Reviewed desk-note draft. JP owns thesis, facts, final approval.
    decision_lens_rank: 3
    why_now: Paid demand exists now; output must be source-grounded and sound like JP.
    main_risk: Voice, factual accuracy and template route.
    proof_needed: Prior reports; source-pack rules; reference report editable source; Nic's brain dump; review owner.

  - id: market-screening
    name: Market screening and outreach
    category: RESEARCH AND MARKETING
    slices: ["9"]
    starts: Thematic or trading-idea brief from JP.
    stops: Vetted candidate list, sourced contacts, draft outreach. Trading ideas hand back to client communications.
    decision_lens_rank: 4
    why_now: Could create new mandates and trading ideas; feeds the desk-note product.
    main_risk: Market-data source, contact research and exclusion rules.
    proof_needed: Iress or licensed data route; standard screens; MD contact source; approval rules.

  - id: events-marketing
    name: Event and invitation production
    category: RESEARCH AND MARKETING
    slices: ["5"]
    starts: JP decides it needs a flyer, invitation, social campaign or marketing piece.
    stops: Approved creative and draft distribution assets. RSVP route unconfirmed.
    decision_lens_rank: 5
    why_now: Real time saving but lower strategic value.
    main_risk: Owner, design tool, editability and RSVP route unknown.
    proof_needed: Editable example; marketing owner; brand pack; approval path; RSVP route.

  - id: signal-capture
    name: Secure signal capture layer
    category: FIRM-WIDE
    slices: ["6"]
    starts: Approved source channels are defined.
    stops: Captured records, client folders, surfaced signals, draft prompts. Never sends, posts, trades or acts.
    decision_lens_rank: parallel-foundation
    why_now: Thin version (ASX watch-list monitoring + per-corporate-client folders) feeds later workflows without touching firm email.
    main_risk: Full version needs Adisyn, AFSL, role access and audit decisions.
    proof_needed: Watch list; folder structure; role map; governance decision.

shared_foundations:
  - id: holder-recipient-identity
    why: Turns raw Front Office exports into one client one row, related entities grouped and remembered.
    used_by: [client-communications, capital-raise]
    slice_home: "2"
  - id: market-data-source
    why: One trusted source for VWAP, last close, market cap, cash, shares on issue.
    used_by: [capital-raise, client-communications, desk-notes, market-screening]
  - id: jp-voice-examples
    why: Stops outputs sounding generic; keeps adviser tone consistent; must not read as AI.
    used_by: [client-communications, desk-notes, events-marketing, market-screening]
  - id: per-corporate-client-folders
    why: Reusable per-company history of announcements, mandates, decks, prior JP work.
    used_by: [desk-notes, capital-raise, market-screening, client-communications, signal-capture]
  - id: controlled-workspace-audit
    why: JP approves what the system can read, what it cannot do, what gets logged.
    used_by: [all]

cross_cutting_rules:
  - No automatic sending. AI drafts and stages; JP reviews and sends. Price-sensitive prepared by default; others assessed for materiality.
  - Keep the personal adviser voice; must not read as AI. Adviser-branded sending by code is a relationship requirement.
  - Front Office (Morrison) is the record for holder/contact/account data. Complii syncs from it daily.
  - Controlled access first — limited credentials, audit logs, explicit approval points, IT provider sign-off before connection.

decision_lens_order:
  - {rank: P, workflow: signal-capture, note: thin version in parallel}
  - {rank: 1, workflow: client-communications}
  - {rank: 2, workflow: capital-raise}
  - {rank: 3, workflow: desk-notes}
  - {rank: 4, workflow: market-screening}
  - {rank: 5, workflow: events-marketing}
