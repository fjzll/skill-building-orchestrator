slice: "7"
title: ASX Social Media Posts
workflow: client-communications
working_date: 2026-06-30
tagline: A "post this?" branch off the client update workflow.
what_changes: >
  A light branch off client updates, not a separate machine. AI spots the
  announcement (already detected for the email), judges post-worthiness against
  the house rule, drafts a short JP-style post for X and LinkedIn from best
  previous posts. Drafts land in the same review pack beside the client email.
  Adviser approves before it goes public; posting stays with JP (paste into apps
  until one-click publishing is set up). Nothing posts on its own.
steps:
  - id: "1"
    title: An ASX announcement appears
    today: Adviser sees announcement — same trigger as client update email.
    with_ai: Handled by client update workflow; social branch starts from content already in hand.
    states: [automate]
  - id: "2"
    title: Is it worth a public post?
    today: House-style call — selective, weighted to paying clients and bigger news.
    with_ai: AI offers "post this?" suggestion beside email approval with one-line reason from house rule. Gap — exact rule to capture.
    states: [automate]
  - id: "3"
    title: Draft the post
    today: Someone writes short branded post; author and contents not described.
    with_ai: AI drafts X and LinkedIn versions from same announcement and summary, matched to JP voice from best previous posts. Jason asked for exactly this skill. Gap — share 3-4 best recent posts.
    states: [automate]
  - id: "4"
    title: Approve the wording
    today: Someone (likely relationship adviser) signs off before public.
    with_ai: Adviser reviews/edits in same review pack as email, approves. AI never approves its own wording. Assumption — email approver also approves post.
    states: [human-review]
  - id: "5"
    title: Post to X and LinkedIn
    today: Someone publishes to JP pages; tool and login holders not stated.
    with_ai: Two routes — software publishing once access set up (X straightforward, small per-post fee; LinkedIn needs page-admin login + LinkedIn approval), or person pastes approved post. Default is paste.
    states: [access-to-confirm, human]
step_counts: {automate: 3, access_to_confirm: 1, human_review: 1, human: 1}
open_questions:
  - q: What tips an announcement over the line for a public post beyond paying client and big announcement?
    who: Jason
  - q: What does a good JP post contain? Share three or four best recent posts.
    who: Jason / Nic
  - q: Who drafts, approves and publishes today, through what tool?
    who: Jason / office
  - q: Who holds X and LinkedIn logins; one-click publishing or copy-paste?
    who: Jason / office
fits: >
  Inside the client communications engine — the "also post this" branch of client
  updates, same announcement and summary, one more output in the same review pack.
  Posting connector shareable with events-marketing later.
effort: >
  Small. Lightest slice in the review — a small extension of the client update
  skill. One-click X adds a little; LinkedIn depends on JP securing LinkedIn
  approval, outside the build.
