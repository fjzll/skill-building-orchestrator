slice: "3a"
title: Term Sheet Preparation
workflow: capital-raise
parent_slice: "3"
working_date: 2026-06-30
tagline: AI builds the term sheet and deal text. You set the price and sign off the numbers.
what_changes: >
  The late-night error-prone part of every raise. Today Lauren fills the JP
  template from the mandate, Nic writes overview and investment highlights, Jason
  sets price and works the maths the night before — discount to last close,
  discount to ten-day VWAP, shares issued, market cap, EV, post-offer cash. With
  AI it runs as one pass — read signed mandate, fill template, draft overview and
  highlights from prior JP term sheets, lift offer details and director
  commitments from mandate, set timetable and use-of-funds, compute the whole
  capital-structure block from a confirmed source, exact arithmetic showing its
  working. JP keeps the offer-price call and a named person signs off final
  numbers. Output formatted the way Complii expects.
steps:
  - id: "1"
    title: Terms confirmed and the mandate located
    today: Jason/Nic tell Lauren the terms; Lauren starts from signed mandate.
    with_ai: AI reads signed mandate and deal brief, opens a new term-sheet build. Terms decision stays JP's, made before this point.
    states: [automate]
  - id: "2"
    title: Template filled from the mandate
    today: Lauren copies reusable mandate wording into matching template sections. "We use the text a lot in the term sheet that we get in the mandate."
    with_ai: AI maps mandate wording into right sections in one pass. Open — gold-standard term sheet needed.
    states: [automate]
  - id: "3"
    title: Company overview drafted
    today: Nic drafts/updates overview, usually from a prior version.
    with_ai: AI drafts from prior term sheet for that company plus recent announcements. Open — which materials sit behind the overview.
    states: [automate]
  - id: "4"
    title: Investment highlights written
    today: Nic writes highlights, team adjusts. Named the most time-consuming part.
    with_ai: AI produces first set from past highlights and deal facts, in JP voice with personal twang. "A draft set is produced and we all might make adjustments."
    states: [automate]
  - id: "5"
    title: Offer details and director commitments
    today: Jason and Lauren insert offer-details line and director/exec commitments. "The line we take out of the mandate."
    with_ai: AI pulls the line and named commitments from mandate.
    states: [automate]
  - id: "6"
    title: Use of funds set
    today: Team sets use-of-funds, changes every raise.
    with_ai: AI drafts from mandate and company material.
    states: [automate]
  - id: "7"
    title: Ten-day VWAP and last close
    today: Team emails back office (full Iress) for ten-day VWAP and last close. Can be found online too.
    with_ai: AI pulls from a set data source, no email round-trip. Access — settle which source is the official figure (today back-office Iress).
    states: [automate, access-to-confirm]
  - id: "8"
    title: Price and discounts set
    today: Jason sets offer price and discounts, normally the night before.
    with_ai: Offer price stays JP's decision; the moment it is entered AI computes discount to last close and ten-day VWAP (Gateway worked out to 11.8%).
    states: [human]
  - id: "9"
    title: The capital-structure maths
    today: Team pulls last issued shares, works shares-to-issue, market cap, EV, cash, post-offer cash. The late-night error point — "just data that can be pulled from websites."
    with_ai: AI pulls shares on issue and cash from latest filings, computes whole block, exact and reproducible, shows its working. Most error risk removed. Access — settle source.
    states: [automate, access-to-confirm]
  - id: "10"
    title: Timetable set
    today: About seven days from the day the stock resumes trading. "Always seven days."
    with_ai: AI fills standard seven-day timetable off the back-to-trading date.
    states: [automate]
  - id: "11"
    title: Disclosure lines updated
    today: Lauren updates per-deal disclosure/screen lines (holding line, lead-manager line, options); rest standard.
    with_ai: AI applies the per-deal changes. Open — short session with Lauren to capture which lines change.
    states: [automate]
  - id: "12"
    title: Final check before use
    today: A final check exists but owner and method unclear.
    with_ai: AI re-derives every number, flags any line that does not reconcile; a named person signs off before it enters the raise. Self-check designed in deliberately.
    states: [human-review]
  - id: "13"
    title: Deal text formatted for Complii
    today: Lauren copies background and highlights, reformats the way Complii expects.
    with_ai: AI outputs deal text already in Complii layout, paste-ready. Open — exact Complii format needed.
    states: [automate, access-to-confirm]
step_counts: {automate: 8, access_to_confirm: 3, human_review: 1, human: 1}
fits: >
  The term-sheet part of Slice 3. Getting it built reliably unlocks the whole
  raise — Complii runs the rest. Past-term-sheet library and house voice reused
  by Slice 4 and Slice 1; market-data source settled here used by those. Build
  alongside the client-update engine — shared groundwork.
effort: >
  Medium. Drafting-and-maths assistant against existing template, not heavy
  engineering. Carries — past term-sheet library, Nic's highlights pattern,
  Lauren's disclosure lines, one price/shares source, gold-standard template,
  Complii format. One of the strongest value-for-effort in the review.
