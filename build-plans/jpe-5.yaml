slice: "5"
title: Marketing, Events and Investor Invitations
workflow: events-marketing
working_date: 2026-06-30
tagline: Brief to branded draft in minutes; JP signs off and sends.
what_changes: >
  AI runs almost the whole flyer-and-invitation line — gathers brief and logos,
  produces first-draft flyer/invitation in brand in minutes, redraws instantly on
  each adviser change request, runs brand-and-compliance check, prepares send as
  draft. Two human points — final sign-off on investor-facing piece, pressing
  send. Today one flyer with three company logos took most of a day plus rounds
  of back-and-forth. Prerequisite — a proper JP brand style guide from the
  current logo-and-colour pack; also lifts desk notes and client updates.
steps:
  - id: "1"
    title: Need arises
    today: Leadership/advisers decide the firm needs a flyer, invitation or social piece, often tied to an event or note.
    with_ai: Decision stays leadership's; AI assembles structured brief and asset checklist.
    states: [automate]
  - id: "2"
    title: Brief and assets
    today: Someone pulls event details and company logos together (three logos, three firms, one flyer on 28-May).
    with_ai: AI turns trigger into clean brief (event, venue, time, companies, audience), gathers logos, pulls from JP brand style guide. Needs brand pack + style guide (content to supply).
    states: [automate]
  - id: "3"
    title: First draft
    today: One staff member builds by hand; one flyer took most of a day. Design tool unconfirmed.
    with_ai: Branded-template tool produces first-draft layout in JP brand in minutes from brief + style guide. Access — best design tool/output route to confirm (0.5-1 day test).
    states: [automate, access-to-confirm]
  - id: "4"
    title: Review loop
    today: Advisers send back changes round after round; pieces "quite often come back". The tedious part.
    with_ai: AI redraws on plain-English request instantly. Biggest single time saver; runs as one loop with Step 3.
    states: [automate]
  - id: "5"
    title: Sign-off
    today: Approved for brand, compliance wording, audience. No formal step on record.
    with_ai: AI runs brand-and-compliance check against JP checklist, flags issues; named person signs off. Needs checklist and confirmed approver.
    states: [automate, human-review]
  - id: "6"
    title: Distribution
    today: Mailchimp (~5,983 contacts), Outlook, or X/LinkedIn depending on piece. Channel-per-piece and sender open.
    with_ai: AI prepares send as draft — Mailchimp campaign draft, Outlook draft, or social draft (Slice 7). JP picks channel and presses send. Mailchimp documented; Outlook needs IT + compliance sign-off.
    states: [automate, access-to-confirm, human]
  - id: "7"
    title: Event RSVPs
    today: How RSVPs and attendee lists are captured is not on record.
    with_ai: Once RSVP route is clear (form, reply mailbox, event tool), AI tracks replies and builds attendee list.
    states: [automate, access-to-confirm]
step_counts: {automate: 6, access_to_confirm: 3, human_review: 1, human: 1}
data_access:
  - {source: Design tool, route: unknown tool; Claude-based design or Canva (business plan needed), confidence: low until confirmed}
  - source: Mailchimp
    route: documented supported connection, campaign draft only
    confidence: medium-high
  - source: Outlook / M365
    route: documented connection, draft only, IT + compliance gated
    confidence: medium
  - {source: X and LinkedIn, route: covered by Slice 7, confidence: see slice 7}
  - {source: Logos and brand assets, route: supplied brand pack; style guide needed first, confidence: low until supplied}
  - {source: Event RSVPs, route: no route yet, confidence: low}
fits: >
  Research and marketing engine. Branded-template tool shared with desk notes —
  build once, point at both. Most valuable groundwork is the JP brand style guide.
effort: >
  Small to Medium. Lighter than desk notes — no research or writing engine.
  Prerequisites — brand style guide, design-output test (run with desk-notes test).
