slice: "4"
title: Desk Notes and Research Reports
workflow: desk-notes
working_date: 2026-06-30
tagline: Paid branded desk notes — AI drafts, JP signs off and issues.
what_changes: >
  Today a desk note is a blank-page job over weeks. AI runs the first seven steps
  as one chain — gathers company material, learns the pattern from past notes,
  writes the first draft in JP voice, lays out in branded structure, strips
  machine tone. Three reusable parts plus voice clean-up — research part, drafting
  part, formatting part. JP feeds in which company and the thesis. Two human
  points at the end — sign off the firm's view, issue the note. Aim — price well
  below competitors charging tens of thousands, which only works if the draft is
  quick and consistent. Four or five companies asked in the last fortnight and
  would pay a few thousand each.
steps:
  - id: "1"
    title: Company opportunity identified or requested
    today: JP leadership picks or is asked by an ASX company that will pay.
    with_ai: AI confirms code, pulls recent announcements and latest investor presentation into a draft folder, flags missing items. Company choice stays JP's.
    states: [automate]
  - id: "2"
    title: Source pack gathered
    today: Materials gathered by hand; exact list undefined.
    with_ai: Once the expected pack is defined, AI assembles per company (announcements, presentation, prior coverage, JP files), lists what is missing. Access — ASX/market data route under JP licence.
    states: [automate, access-to-confirm]
  - id: "3"
    title: JP thesis and judgement
    today: Angle, catalysts, what matters live in the adviser's head, mainly Nic's.
    with_ai: AI does not invent the thesis. Brain dump captured once, turned into reusable writing principles; per-company angle supplied as input. Gap — brain dump not recorded yet.
    states: [automate]
  - id: "4"
    title: Prior reports as house style
    today: Past JP notes, competitor reports, structured example read by hand.
    with_ai: Research part reads house-style library plus source pack, produces research and structure guide. Gap — prior-report library and editable template not supplied.
    states: [automate]
  - id: "5"
    title: Draft written
    today: By hand over weeks. Max recently produced one AI-assisted draft.
    with_ai: Drafting part writes first 5-6 page note from research guide, source pack, thesis, in JP voice. Max's draft and tools wanted as starting point.
    states: [automate]
  - id: "6"
    title: Formatted into JP style
    today: Laid out by hand; PAA PDF shows target look.
    with_ai: Formatting part reproduces structured layout, flexes company-specific sections. Short test (0.5-1 day) across Claude Design, Word, PowerPoint, PDF to pick output route. Access — editable template source and platform.
    states: [automate, access-to-confirm]
  - id: "7"
    title: De-AI and personalisation
    today: Reviewer who knows JP voice edits so it does not read machine-written (Toddy offered).
    with_ai: AI runs de-AI pass from encoded voice rules; final polish rides into Step 8 sign-off, not a separate gate. Gap — whether encoded rules need manual polish every note.
    states: [automate]
  - id: "8"
    title: JP signs off and issues
    today: JP reviews facts, thesis, wording, quality; approves; issues.
    with_ai: AI prepares checklist (every fact traced to source, thesis alignment, wording, research disclaimer). JP signs off the firm's view, then issues. Nothing published automatically.
    states: [human-review, human]
step_counts: {automate: 7, access_to_confirm: 2, human_review: 1, human: 1}
data_access:
  - {source: Company ASX announcements, route: PDFs in source pack first; official paid ASX data service or resellers for auto-gather, confidence: easy files / medium live}
  - {source: Price and market data, route: reuse JP's paid terminal data feed, confidence: medium}
  - {source: Substantial holders and directors, route: disclosed holder notices + annual report in source pack, confidence: easy}
  - {source: Past reports, route: controlled JP-provided folder, confidence: solid once shared}
  - {source: Structured template, route: editable template or rebuild from example, confidence: easy if supplied / medium rebuilt}
fits: >
  Standalone build in research and marketing. Branded output engine carries to
  event/marketing material; ASX and market-data connection shared with client
  updates and screening — solve once.
effort: >
  Medium. First useful version buildable from examples, defined source pack,
  Nic's brain dump, structured template. Platform test and auto data gathering
  lift toward upper Medium; supplied-files source pack lands lower.
